# Seguridad: PostgreSQL solo expuesto internamente, resource limits aplicados
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Frontend - Pulsos Sociales
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Variables requeridas
        VITE_MAPTILER_KEY: ${VITE_MAPTILER_KEY}
        # Variables opcionales (para persistencia)
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
        # Metadata del build
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
    container_name: pulsos-frontend
    ports:
      - "${PORT:-80}:80"
    restart: unless-stopped
    environment:
      # Nginx log level
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - pulsos-network
    # Resource limits para seguridad y estabilidad
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    # Volumes para logs (opcional)
    # volumes:
    #   - ./logs/nginx:/var/log/nginx

