# Kong Configuration for Pulsos Sociales - Easypanel Compatible
# Usa nombres de servicio completos de Easypanel

_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-route
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - X-Request-ID
            - apikey
          exposed_headers:
            - "*"
          max_age: 3600

  - name: rest
