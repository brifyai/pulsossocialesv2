# Kong Configuration for Pulsos Sociales
# Simplified configuration without environment variable substitution

_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Client-Info
            - X-Request-ID
            - apikey
          exposed_headers:
            - "*"
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 60
          hour: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false
          redis_timeout: 2000
          redis_database: 0
          limit_by: ip
          header_name: null
          block_on_first_violation: false

