# =============================================================================
# Docker Compose Override - EasyPanel
# Pulsos Sociales - Anulación de servicios no deseados
# =============================================================================
#
# Este archivo anula servicios que no deben ejecutarse en EasyPanel.
# Se carga automáticamente con: docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# =============================================================================

version: "3.8"

# Anular servicios de analytics y vector para que no se inicien
services:
  analytics:
    deploy:
      replicas: 0
    profiles:
      - disabled

  vector:
    deploy:
      replicas: 0
    profiles:
      - disabled
