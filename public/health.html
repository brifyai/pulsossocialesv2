<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsos Sociales - Health Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
        }
        .status-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .status-card {
            background: #1e293b;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
            border-left: 4px solid #64748b;
        }
        .status-card.healthy {
            border-left-color: #22c55e;
        }
        .status-card.warning {
            border-left-color: #f59e0b;
        }
        .status-card.error {
            border-left-color: #ef4444;
        }
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .status-name {
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-badge.healthy {
            background: #22c55e20;
            color: #22c55e;
        }
        .status-badge.warning {
            background: #f59e0b20;
            color: #f59e0b;
        }
        .status-badge.error {
            background: #ef444420;
            color: #ef4444;
        }
        .status-detail {
            font-size: 0.875rem;
            color: #94a3b8;
            line-height: 1.5;
        }
        .timestamp {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
            font-size: 0.75rem;
            color: #64748b;
        }
        .version {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        .checks-list {
            list-style: none;
            margin-top: 0.5rem;
        }
        .checks-list li {
            padding: 0.25rem 0;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .checks-list li::before {
            content: "•";
            color: #64748b;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Pulsos Sociales - Health Check</h1>
        
        <div class="status-grid" id="statusGrid">
            <!-- Status cards will be inserted here -->
        </div>

        <div class="timestamp" id="timestamp"></div>
        <div class="version" id="version"></div>
    </div>

    <script>
        // Health check configuration
        const HEALTH_CONFIG = {
            version: '1.0.0',
            checks: {
                frontend: {
                    name: 'Frontend',
                    check: () => Promise.resolve({ status: 'healthy', detail: 'Static files serving correctly' })
                },
                supabase: {
                    name: 'Supabase Connection',
                    check: async () => {
                        const url = window.__ENV__?.VITE_SUPABASE_URL || '';
                        if (!url) {
                            return { status: 'warning', detail: 'Not configured - running in demo mode' };
                        }
                        try {
                            const response = await fetch(`${url}/rest/v1/`, { 
                                method: 'HEAD',
                                headers: { 'Accept': 'application/json' }
                            });
                            if (response.ok || response.status === 401) {
                                return { status: 'healthy', detail: `Connected to ${url}` };
                            }
                            return { status: 'error', detail: `HTTP ${response.status}` };
                        } catch (e) {
                            return { status: 'error', detail: 'Connection failed' };
                        }
                    }
                },
                auth: {
                    name: 'Authentication',
                    check: () => {
                        const session = localStorage.getItem('pulsos_session');
                        if (session) {
                            try {
                                const parsed = JSON.parse(session);
                                const isDemo = parsed.demo;
                                return { 
                                    status: isDemo ? 'warning' : 'healthy', 
                                    detail: isDemo ? 'Demo session active' : 'User session active' 
                                };
                            } catch {
                                return { status: 'warning', detail: 'Invalid session data' };
                            }
                        }
                        return { status: 'healthy', detail: 'No active session' };
                    }
                },
                storage: {
                    name: 'Local Storage',
                    check: () => {
                        try {
                            localStorage.setItem('__health_test__', 'test');
                            localStorage.removeItem('__health_test__');
                            return { status: 'healthy', detail: 'Storage accessible' };
                        } catch (e) {
                            return { status: 'error', detail: 'Storage not available' };
                        }
                    }
                }
            }
        };

        // Run health checks
        async function runHealthChecks() {
            const grid = document.getElementById('statusGrid');
            const timestamp = document.getElementById('timestamp');
            const version = document.getElementById('version');

            // Set version
            version.textContent = `Version: ${HEALTH_CONFIG.version}`;

            // Clear grid
            grid.innerHTML = '';

            // Run all checks
            const results = await Promise.all(
                Object.entries(HEALTH_CONFIG.checks).map(async ([key, config]) => {
                    try {
                        const result = await config.check();
                        return { key, name: config.name, ...result };
                    } catch (e) {
                        return { key, name: config.name, status: 'error', detail: e.message };
                    }
                })
            );

            // Render results
            results.forEach(result => {
                const card = document.createElement('div');
                card.className = `status-card ${result.status}`;
                card.innerHTML = `
                    <div class="status-header">
                        <span class="status-name">${result.name}</span>
                        <span class="status-badge ${result.status}">${result.status.toUpperCase()}</span>
                    </div>
                    <div class="status-detail">${result.detail}</div>
                `;
                grid.appendChild(card);
            });

            // Set timestamp
            timestamp.textContent = `Last checked: ${new Date().toLocaleString('es-CL')}`;
        }

        // Run on load
        runHealthChecks();

        // Auto-refresh every 30 seconds
        setInterval(runHealthChecks, 30000);
    </script>
</body>
</html>
