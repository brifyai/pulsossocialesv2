# =============================================================================
# Docker Compose Override - EasyPanel
# Pulsos Sociales - Configuración para EasyPanel
# =============================================================================
#
# Este archivo sobrescribe servicios problemáticos para el despliegue en EasyPanel.
# Se carga automáticamente con: docker compose up
#
# =============================================================================

version: "3.8"

# Deshabilitar servicios de analytics y vector que causan problemas en EasyPanel
services:
  analytics:
    image: alpine:latest
    container_name: pulsos-analytics
    entrypoint: ["sh", "-c", "echo 'Analytics service disabled for EasyPanel' && while true; do sleep 3600; done"]
    # Usar el puerto configurado en ANALYTICS_PORT (4111) para evitar conflictos
    ports:
      - "${ANALYTICS_PORT:-4111}:4000"
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'Health check passed' && exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pulsos-network

  vector:
    image: alpine:latest
    container_name: pulsos-vector
    entrypoint: ["sh", "-c", "echo 'Vector service disabled for EasyPanel' && while true; do sleep 3600; done"]
    # No expone puertos para evitar conflictos
    ports: []
    healthcheck:
      test: ["CMD", "sh", "-c", "echo 'Health check passed' && exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pulsos-network

# Asegurar que use la misma red que el docker-compose principal
networks:
  pulsos-network:
    driver: bridge
    external: true
