# =============================================================================
# Docker Compose Override - EasyPanel
# Pulsos Sociales - Deshabilitar servicios problemáticos
# =============================================================================
#
# Este archivo deshabilita servicios de analytics y vector que causan
# problemas en el despliegue de EasyPanel.
#
# Se carga automáticamente con: docker compose up
#
# =============================================================================

version: "3.8"

# Deshabilitar servicios de analytics y vector para EasyPanel
# Usando entrypoint que no hace nada para evitar que los contenedores inicien
services:
  analytics:
    entrypoint: ["echo", "Analytics service disabled"]
    command: []
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 30s
      timeout: 10s
      retries: 3

  vector:
    entrypoint: ["echo", "Vector service disabled"]
    command: []
    healthcheck:
      test: ["CMD", "echo", "ok"]
      interval: 30s
      timeout: 10s
      retries: 3
