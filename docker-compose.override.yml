# =============================================================================
# Docker Compose Override - EasyPanel
# Pulsos Sociales - Configuración para EasyPanel
# =============================================================================
#
# Este archivo sobrescribe servicios problemáticos para el despliegue en EasyPanel.
# Se carga automáticamente con: docker compose up
#
# =============================================================================

version: "3.8"

# Deshabilitar servicios de analytics y vector que causan problemas en EasyPanel
services:
  analytics:
    image: alpine:latest
    entrypoint: ["sh", "-c", "echo 'Analytics service disabled' && sleep infinity"]
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  vector:
    image: alpine:latest
    entrypoint: ["sh", "-c", "echo 'Vector service disabled' && sleep infinity"]
    healthcheck:
      test: ["CMD", "sh", "-c", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
